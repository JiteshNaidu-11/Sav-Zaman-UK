<svg viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Red Arrow/Peak Background -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B22020;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left Triangle -->
  <polygon points="60,20 50,60 85,60" fill="url(#redGradient)" />
  
  <!-- Right Triangle -->
  <polygon points="100,20 115,60 85,60" fill="#DC143C" />
  
  <!-- Center Peak Triangle -->
  <polygon points="82,10 100,50 65,50" fill="url(#redGradient)" />
  
  <!-- Text: MORE ESTATE -->
  <text x="150" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1A1A1A" letter-spacing="2">
    MORE ESTATE
  </text>
  
  <!-- Tagline -->
  <text x="150" y="80" font-family="Arial, sans-serif" font-size="14" fill="#333333" letter-spacing="0.5">
    Trusted Name In Real Estate
  </text>
  
  <!-- Decorative line under tagline -->
  <line x1="150" y1="88" x2="290" y2="88" stroke="#DC143C" stroke-width="2" />
</svg>